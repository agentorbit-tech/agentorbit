# postgres-walg.conf — drop-in fragment for postgresql.conf to enable
# continuous archiving via WAL-G.
#
# Apply via either:
#   - Append the lines below to /etc/postgresql/17/main/postgresql.conf, OR
#   - Place this file in conf.d/ if your distribution sets `include_dir`.
#
# After editing, restart postgres:
#   systemctl restart postgresql
#
# Cross-reference: docs/deployment-guide.md "Backups (Self-host)" and the
# companion env file examples/backups/wal-g.env.example.

# wal_level = replica is the minimum for WAL archiving. "logical" is also
# acceptable if you also use logical replication.
wal_level = replica

# Turn archiving on. Without this archive_command is ignored.
archive_mode = on

# Forward every completed WAL segment to WAL-G. The wal-g binary reads its
# config from /etc/wal-g.env (loaded via EnvironmentFile in the postgres
# unit) — see examples/backups/wal-g.env.example.
archive_command = '/usr/local/bin/wal-g wal-push %p'

# Force a WAL switch every minute even on idle clusters so the recovery
# window stays close to the WALG_RPO target. Tune to taste; lower means more
# WAL files (and more S3 PUTs) but tighter PITR resolution.
archive_timeout = 60

# Keep enough WAL on disk to recover from short S3 outages without losing
# segments. 1 GB ≈ 64 WAL files.
max_wal_size = 1GB
min_wal_size = 256MB

# When restoring on a fresh host, pair this conf with a recovery.signal file
# and the matching restore_command in postgresql.auto.conf:
#
#   restore_command = '/usr/local/bin/wal-g wal-fetch %f %p'
#
# See the runbook scenario "Deploy failed mid-migration" and
# docs/deployment-guide.md for the full restore procedure.
